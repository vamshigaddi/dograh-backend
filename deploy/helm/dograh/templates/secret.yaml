{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dograh.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dograh.labels" . | nindent 4 }}
type: Opaque
stringData:
  OSS_JWT_SECRET: {{ required "secrets.ossJwtSecret is required" .Values.secrets.ossJwtSecret | quote }}
  TURN_SECRET: {{ .Values.secrets.turnSecret | quote }}
  {{- if eq .Values.database.mode "external" }}
  DATABASE_URL: {{ required "secrets.databaseUrl is required when database.mode=external" .Values.secrets.databaseUrl | quote }}
  {{- end }}
  {{- if eq .Values.redis.mode "external" }}
  REDIS_URL: {{ required "secrets.redisUrl is required when redis.mode=external" .Values.secrets.redisUrl | quote }}
  {{- end }}
  {{- /* internalMinio creds are sourced from the <release>-minio secret via
         dograh.dbEnv; only externalMinio pulls creds from here. */}}
  {{- if eq .Values.storage.mode "externalMinio" }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.minioAccessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minioSecretKey | quote }}
  {{- end }}
  {{- if eq .Values.storage.mode "s3" }}
  {{- if .Values.secrets.awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.secrets.langfuseSecretKey }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | quote }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | quote }}
  {{- end }}
{{- end }}
