{{- if .Values.coturn.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dograh.coturn.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dograh.labels" . | nindent 4 }}
    app.kubernetes.io/component: coturn
data:
  turnserver.conf: |
    # Auto-generated by the Dograh Helm chart.
    listening-port={{ .Values.coturn.ports.plain }}
    tls-listening-port={{ .Values.coturn.ports.tls }}

    min-port={{ .Values.coturn.relayPortRange.min }}
    max-port={{ .Values.coturn.relayPortRange.max }}

    {{- if .Values.coturn.externalIp }}
    external-ip={{ .Values.coturn.externalIp }}
    {{- else }}
    # external-ip not yet set. Run:
    #   helm upgrade {{ .Release.Name }} . --reuse-values --set coturn.externalIp=<LB_IP>
    # once the LoadBalancer Service has an address.
    {{- end }}

    realm={{ .Values.coturn.realm }}

    # static-auth-secret is passed on the turnserver command line (see the
    # deployment); the ConfigMap stays secret-free.
    use-auth-secret

    fingerprint
    no-cli
    no-multicast-peers

    log-file=stdout
{{- end }}
