apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dograh.arqWorker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dograh.labels" . | nindent 4 }}
    app.kubernetes.io/component: arq-worker
spec:
  {{- /* Omit spec.replicas only when the HPA object will actually render — matches
         the gate in templates/arq-worker-hpa.yaml. If HPA is enabled but both
         metric targets are null the HPA is suppressed, so we must keep the
         static replica count here to avoid a Deployment with no owner. */ -}}
  {{- if not (and .Values.autoscaling.workers.enabled (or .Values.autoscaling.workers.targetCPUUtilizationPercentage .Values.autoscaling.workers.targetMemoryUtilizationPercentage)) }}
  replicas: {{ .Values.workers.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "dograh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: arq-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "dograh.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: arq-worker
      annotations:
        # Roll pods when the ConfigMap changes. See web-deployment.yaml for
        # the full rationale.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.workers.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "dograh.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: arq-worker
          image: {{ include "dograh.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["./scripts/run_arq_worker.sh"]
          envFrom:
            {{- include "dograh.backendEnvFrom" . | nindent 12 }}
          env:
            {{- include "dograh.dbEnv" . | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.workers.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.workers.resources | nindent 12 }}
      {{- with .Values.workers.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workers.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workers.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
