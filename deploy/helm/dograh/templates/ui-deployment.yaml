{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dograh.ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dograh.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  {{- /* Omit spec.replicas only when the HPA object will actually render — matches
         the gate in templates/ui-hpa.yaml. If HPA is enabled but both metric
         targets are null the HPA is suppressed, so we must keep the static
         replica count here to avoid a Deployment with no owner. */ -}}
  {{- if not (and .Values.autoscaling.ui.enabled (or .Values.autoscaling.ui.targetCPUUtilizationPercentage .Values.autoscaling.ui.targetMemoryUtilizationPercentage)) }}
  replicas: {{ .Values.ui.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "dograh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "dograh.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
      {{- with .Values.ui.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "dograh.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ include "dograh.ui.image" . }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.port }}
              protocol: TCP
          env:
            # Next.js standalone binds to $HOSTNAME (falls back to 0.0.0.0).
            # Kubernetes injects HOSTNAME=<pod-name>, which /etc/hosts maps to the
            # pod IP — so without this, Next listens on the pod IP ONLY. In-cluster
            # Service traffic still works, but loopback (kubectl port-forward, local
            # health checks) is refused. Pin to 0.0.0.0 to listen on all interfaces.
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "oss"
            - name: BACKEND_URL
              value: {{ default (printf "http://%s:%d" (include "dograh.web.fullname" .) (int .Values.web.service.port)) .Values.ui.backendUrl | quote }}
            - name: ENABLE_TELEMETRY
              value: {{ .Values.config.enableTelemetry | quote }}
            - name: POSTHOG_KEY
              value: {{ .Values.config.posthogApiKey | quote }}
            - name: POSTHOG_HOST
              value: {{ .Values.config.posthogHost | quote }}
          livenessProbe:
            {{- toYaml .Values.ui.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.ui.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
