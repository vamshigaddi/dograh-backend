# Single-node deployment (k3s, minikube, single VM).
# All stateful deps bundled in-cluster, Ingress for HTTP, smaller resources.

database:
  mode: internal
redis:
  mode: internal
storage:
  mode: internalMinio
exposure:
  mode: ingress
  ingress:
    className: nginx
    host: dograh.local

config:
  environment: production
  logLevel: DEBUG

web:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 1.5Gi
  pdb:
    enabled: false

workers:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ui:
  replicaCount: 1
  pdb:
    enabled: false

autoscaling:
  web:
    enabled: true
    minReplicas: 2
    maxReplicas: 12

postgresql:
  persistence:
    size: 2Gi
redisinternal:
  persistence:
    size: 1Gi
minio:
  persistence:
    size: 5Gi
